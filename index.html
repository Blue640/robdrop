<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <title>RobDrop - MM2 Casino</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">🎰</div>
            <div class="splash-title">RobDrop</div>
            <div class="loading-bar">
                <div class="loading-fill"></div>
            </div>
            <div class="splash-subtitle">Загрузка...</div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app" class="app-container hidden">
        <!-- Навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-screen="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </button>
            <button class="nav-btn" data-screen="inventory">
                <span class="nav-icon">🎒</span>
                <span class="nav-label">Инвентарь</span>
            </button>
            <button class="nav-btn" data-screen="case">
                <span class="nav-icon">🎁</span>
                <span class="nav-label">Кейсы</span>
            </button>
            <button class="nav-btn" data-screen="shop">
                <span class="nav-icon">🏪</span>
                <span class="nav-label">Магазин</span>
            </button>
            <button class="nav-btn" data-screen="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </button>
        </nav>

        <!-- Экраны -->
        <div class="screens-container">
            <!-- Главный экран -->
            <div id="home-screen" class="screen active">
                <div class="header-section">
                    <div class="user-welcome">
                        <div class="user-avatar" id="user-avatar">👤</div>
                        <div>
                            <div class="user-name" id="user-name">Игрок</div>
                            <div class="user-level">Уровень 1</div>
                        </div>
                    </div>
                    <div class="balance-card">
                        <div class="balance-label">Баланс</div>
                        <div class="balance-amount">
                            <span class="coin-icon">💰</span>
                            <span id="coins-display">500</span>
                        </div>
                    </div>
                </div>

                <div class="daily-reward" id="daily-reward">
                    <div class="daily-info">
                        <span class="daily-icon">🎁</span>
                        <span class="daily-text">Ежедневная награда</span>
                    </div>
                    <button class="daily-btn" id="daily-btn" onclick="claimDaily()">
                        Забрать
                    </button>
                </div>

                <div class="quick-actions">
                    <button class="quick-btn case-btn" onclick="openCaseAnimation()">
                        <span class="quick-icon">🎁</span>
                        <span>Открыть кейс</span>
                        <span class="quick-price">100 💰</span>
                    </button>
                    
                    <div class="quick-grid">
                        <button class="quick-btn" onclick="switchScreen('upgrade')">
                            <span class="quick-icon">⬆️</span>
                            <span>Апгрейд</span>
                        </button>
                        <button class="quick-btn" onclick="switchScreen('trade')">
                            <span class="quick-icon">🔄</span>
                            <span>Обмен</span>
                        </button>
                        <button class="quick-btn" onclick="switchScreen('top')">
                            <span class="quick-icon">🏆</span>
                            <span>Топ</span>
                        </button>
                        <button class="quick-btn" onclick="switchScreen('friends')">
                            <span class="quick-icon">👥</span>
                            <span>Друзья</span>
                        </button>
                    </div>
                </div>

                <div class="recent-section">
                    <h3>🎯 Последние дропы</h3>
                    <div id="recent-drops" class="recent-list"></div>
                </div>
            </div>

            <!-- Экран инвентаря -->
            <div id="inventory-screen" class="screen">
                <div class="screen-header">
                    <h2>🎒 Инвентарь</h2>
                    <div class="inventory-stats">
                        <span id="total-items">0 предметов</span>
                    </div>
                </div>
                
                <div class="tier-filters">
                    <button class="tier-btn active" onclick="filterInventory('all')">Все</button>
                    <button class="tier-btn common" onclick="filterInventory('common')">⚪</button>
                    <button class="tier-btn uncommon" onclick="filterInventory('uncommon')">🟢</button>
                    <button class="tier-btn rare" onclick="filterInventory('rare')">🔵</button>
                    <button class="tier-btn epic" onclick="filterInventory('epic')">🟣</button>
                    <button class="tier-btn legendary" onclick="filterInventory('legendary')">🟡</button>
                    <button class="tier-btn ancient" onclick="filterInventory('ancient')">🔴</button>
                </div>
                
                <div id="inventory-list" class="inventory-grid"></div>
            </div>

            <!-- Другие экраны... -->
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-content" class="modal-body"></div>
        </div>
    </div>

    <!-- Тосты -->
    <div id="toast-container" class="toast-container"></div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
