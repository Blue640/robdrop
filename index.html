<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>RobDrop - MM2 Casino</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Экраны приложения -->
    <div id="app">
        <!-- Главный экран -->
        <div id="main-screen" class="screen active">
            <div class="header">
                <div class="logo">🎰 RobDrop</div>
                <div class="balance-container">
                    <div class="balance">
                        <span class="coin-icon">💰</span>
                        <span id="coins-display">500</span>
                    </div>
                </div>
            </div>
            
            <div class="user-greeting">
                Привет, <span id="user-name">Игрок</span>!
            </div>
            
            <div class="main-actions">
                <button class="action-btn case-btn" onclick="openCase()">
                    <span class="btn-icon">🎁</span>
                    <span class="btn-text">Открыть кейс</span>
                    <span class="btn-price">100 💰</span>
                </button>
                
                <div class="actions-grid">
                    <button class="action-btn" onclick="showScreen('inventory-screen')">
                        <span class="btn-icon">🎒</span>
                        <span class="btn-text">Инвентарь</span>
                    </button>
                    <button class="action-btn" onclick="showScreen('shop-screen')">
                        <span class="btn-icon">🏪</span>
                        <span class="btn-text">Магазин</span>
                    </button>
                    <button class="action-btn" onclick="showScreen('upgrade-screen')">
                        <span class="btn-icon">⬆️</span>
                        <span class="btn-text">Апгрейд</span>
                    </button>
                    <button class="action-btn" onclick="showScreen('profile-screen')">
                        <span class="btn-icon">👤</span>
                        <span class="btn-text">Профиль</span>
                    </button>
                </div>
            </div>
            
            <div class="daily-bonus" id="daily-bonus">
                <button class="bonus-btn" onclick="claimDaily()">
                    🎁 Ежедневный бонус
                </button>
            </div>
        </div>
        
        <!-- Экран открытия кейса -->
        <div id="case-screen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Назад</button>
                <h2>🎁 Открытие кейса</h2>
            </div>
            <div id="case-animation" class="case-animation">
                <div class="case-box">📦</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <div id="case-result" class="case-result hidden">
                <div id="result-weapon" class="result-weapon"></div>
                <button class="btn-primary" onclick="openCase()">Открыть еще (100 💰)</button>
                <button class="btn-secondary" onclick="showScreen('main-screen')">На главную</button>
            </div>
        </div>
        
        <!-- Экран инвентаря -->
        <div id="inventory-screen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Назад</button>
                <h2>🎒 Инвентарь</h2>
            </div>
            <div class="inventory-filters">
                <button class="filter-btn active" onclick="filterInventory('all')">Все</button>
                <button class="filter-btn" onclick="filterInventory('common')">Common</button>
                <button class="filter-btn" onclick="filterInventory('uncommon')">Uncommon</button>
                <button class="filter-btn" onclick="filterInventory('rare')">Rare</button>
                <button class="filter-btn" onclick="filterInventory('epic')">Epic</button>
                <button class="filter-btn" onclick="filterInventory('legendary')">Legendary</button>
                <button class="filter-btn" onclick="filterInventory('ancient')">Ancient</button>
            </div>
            <div id="inventory-list" class="inventory-list"></div>
        </div>
        
        <!-- Экран магазина -->
        <div id="shop-screen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Назад</button>
                <h2>🏪 Магазин</h2>
            </div>
            <div id="shop-list" class="shop-list"></div>
        </div>
        
        <!-- Экран апгрейда -->
        <div id="upgrade-screen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Назад</button>
                <h2>⬆️ Апгрейд</h2>
            </div>
            <div class="upgrade-info">
                <p>Объедините 3 одинаковых предмета в 1 предмет следующей редкости!</p>
            </div>
            <div id="upgrade-list" class="upgrade-list"></div>
        </div>
        
        <!-- Экран профиля -->
        <div id="profile-screen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="showScreen('main-screen')">← Назад</button>
                <h2>👤 Профиль</h2>
            </div>
            <div id="profile-content" class="profile-content"></div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-body"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
